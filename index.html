<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин приложений</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
            margin: 0;
            padding: 20px;
        }
        .app-store {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            width: 200px;
            text-align: center;
        }
        .app img {
            width: 100px;
            height: 100px;
        }
    </style>
</head>
<body>

<div class="app-store">
    <div class="app">
        <img src="app-icon.png" alt="App Icon">
        <h3>Название Приложения</h3>
        <button onclick="window.location.href='itms-services://?action=download-manifest&url=https://example.com/your-app.plist'">Установить</button>
    </div>
    <!-- Добавьте другие приложения в том же формате -->
</div>

</body>
</html>
